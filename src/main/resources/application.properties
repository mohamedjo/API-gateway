spring.application.name=api-gateway
server.port=9090

# Eureka discovery service
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Reactive gateway (Spring Cloud 2025+): routes live under server.webflux
spring.cloud.gateway.server.webflux.routes[0].id=livestock-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://LIVESTOCK
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/animals,/api/animals/**

# Keycloak JWT validation (realm: livestock). Tokens are issued by this issuer; use client "livestock-client" in your app to obtain tokens.
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8181/realms/livestock
# Uncomment if you add an Audience mapper in Keycloak so access tokens include this audience:
# spring.security.oauth2.resourceserver.jwt.audiences=livestock-client

spring.application.name=api-gateway
server.port=9090

# Eureka discovery service
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Reactive gateway (Spring Cloud 2025+): routes live under server.webflux
spring.cloud.gateway.server.webflux.routes[0].id=livestock-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://LIVESTOCK
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/animals,/api/animals/**
